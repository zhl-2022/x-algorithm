<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="270" viewBox="0 0 1120 270">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <style>
      .title { font: 700 24px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .box { fill: #ffffff; stroke: #98a2b3; stroke-width: 1.4; rx: 10; }
      .text { font: 16px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #101828; }
      .small { font: 13px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475467; }
      .line { stroke: #344054; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="0" y="0" width="1120" height="270" fill="#ffffff"/>
  <text x="36" y="42" class="title">离线推荐 Pipeline</text>

  <rect x="40" y="95" width="170" height="92" class="box"/>
  <text x="72" y="130" class="text">用户历史行为</text>
  <text x="72" y="160" class="small">ID / 历史点击 / 统计特征</text>

  <rect x="260" y="95" width="160" height="92" class="box"/>
  <text x="300" y="130" class="text">召回模型</text>
  <text x="292" y="160" class="small">Two-Tower / ItemCF</text>

  <rect x="470" y="95" width="150" height="92" class="box"/>
  <text x="508" y="130" class="text">候选集</text>
  <text x="510" y="160" class="small">Top 100/200/500</text>

  <rect x="670" y="95" width="160" height="92" class="box"/>
  <text x="708" y="130" class="text">DNNRanker</text>
  <text x="705" y="160" class="small">候选内排序</text>

  <rect x="880" y="95" width="190" height="92" class="box"/>
  <text x="920" y="130" class="text">TopK 评测</text>
  <text x="914" y="160" class="small">Recall@20 / NDCG@20</text>

  <path d="M210 141 H260" class="line"/>
  <path d="M420 141 H470" class="line"/>
  <path d="M620 141 H670" class="line"/>
  <path d="M830 141 H880" class="line"/>
</svg>
